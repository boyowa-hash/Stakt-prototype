<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STAKT — Build Wealth From Nothing</title>
<meta name="description" content="STAKT is the financial platform for first-generation wealth builders. See how it works.">
<meta property="og:title" content="STAKT — Build Wealth From Nothing">
<meta property="og:description" content="The financial platform for first-generation wealth builders. No trust fund required.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#0A0A0A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{background:#0A0A0A;-webkit-font-smoothing:antialiased}
input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer}
input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:3px;background:#2A2522}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;height:22px;width:22px;border-radius:50%;background:#FF8C00;margin-top:-8px;border:2px solid #0A0A0A;box-shadow:0 2px 8px rgba(255,140,0,0.3)}
input[type=range]::-moz-range-track{height:6px;border-radius:3px;background:#2A2522}
input[type=range]::-moz-range-thumb{height:22px;width:22px;border-radius:50%;background:#FF8C00;border:2px solid #0A0A0A}
textarea:focus,input:focus{border-color:#FF8C00 !important}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse-glow{0%,100%{opacity:0.15}50%{opacity:0.25}}
.desktop-shell{display:none}
@media(min-width:768px){
  .desktop-shell{display:flex;align-items:center;justify-content:center;gap:80px;height:100vh;padding:40px;overflow:hidden}
  .desktop-brand{max-width:420px;flex-shrink:0}
  .desktop-brand h1{font-family:'Outfit',sans-serif;font-weight:800;font-size:56px;color:#F5F0EB;letter-spacing:-0.03em;line-height:1.05}
  .desktop-brand .tagline{font-family:'DM Sans',sans-serif;font-size:18px;color:#A89E94;margin-top:16px;line-height:1.6}
  .desktop-brand .stat-row{display:flex;gap:24px;margin-top:32px}
  .desktop-brand .stat{text-align:left}
  .desktop-brand .stat-num{font-family:'Outfit',sans-serif;font-weight:700;font-size:28px;color:#FF8C00}
  .desktop-brand .stat-label{font-family:'DM Sans',sans-serif;font-size:12px;color:#6B6360;margin-top:2px}
  .desktop-brand .cta-note{font-family:'DM Sans',sans-serif;font-size:13px;color:#6B6360;margin-top:36px;padding-top:24px;border-top:1px solid #2A2522;line-height:1.6}
  .desktop-brand .cta-note span{color:#FF8C00;font-weight:600}
  .phone-frame{width:380px;height:760px;border-radius:40px;border:3px solid #2A2522;overflow:hidden;position:relative;flex-shrink:0;box-shadow:0 24px 80px rgba(0,0,0,0.5),0 0 0 1px rgba(255,140,0,0.05)}
  .phone-frame::before{content:'';position:absolute;top:12px;left:50%;transform:translateX(-50%);width:100px;height:5px;border-radius:3px;background:#2A2522;z-index:10}
  .phone-frame::after{content:'';position:absolute;top:50%;left:50%;width:500px;height:500px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(255,140,0,0.06) 0%,transparent 70%);pointer-events:none;z-index:-1}
  .phone-frame-inner{width:100%;height:100%;overflow:hidden}
  .mobile-fullscreen{display:none}
}
@media(max-width:767px){
  .desktop-shell{display:none}
  .mobile-fullscreen{display:block;height:100%}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// ─── MAILCHIMP INTEGRATION ───
// INSTRUCTIONS: Replace the URL below with your Mailchimp form action URL.
// To find it: Mailchimp → Audience → Signup forms → Embedded forms → copy the form action URL
// It looks like: https://XXXXX.usXX.list-manage.com/subscribe/post?u=XXXXXXXXXX&id=XXXXXXXXXX
const MAILCHIMP_URL = "https://money.us5.list-manage.com/subscribe/post?u=e2124e03a0e42bfe33734a282&id=e2d5904335&f_id=0010f8e9f0";

const subscribeToMailchimp = (email, firstName) => {
  if (!email || MAILCHIMP_URL.includes("PASTE_YOUR")) return;
  try {
    const url = MAILCHIMP_URL.replace("/post?", "/post-json?")
      + "&EMAIL=" + encodeURIComponent(email)
      + (firstName ? "&FNAME=" + encodeURIComponent(firstName) : "")
      + "&c=__mcCb" + Date.now();
    const s = document.createElement("script");
    s.src = url;
    document.body.appendChild(s);
    setTimeout(() => { try { s.remove(); } catch(e){} }, 5000);
  } catch(e) { console.error("Mailchimp error:", e); }
};

// Simple localStorage-based feedback storage for standalone deployment
const feedbackStorage = {
  save: (data) => {
    try {
      const existing = JSON.parse(localStorage.getItem('stakt-feedback') || '[]');
      existing.push(data);
      localStorage.setItem('stakt-feedback', JSON.stringify(existing));
      return true;
    } catch(e) { console.error(e); return false; }
  }
};


const SCREENS = {
  SPLASH: "splash",
  INTRO_1: "intro_1",
  INTRO_2: "intro_2",
  INTRO_3: "intro_3",
  QUIZ_1: "quiz_1",
  QUIZ_2: "quiz_2",
  QUIZ_3: "quiz_3",
  DASHBOARD: "dashboard",
  FEATURE_STACK: "feature_stack",
  FEATURE_CIRCLE: "feature_circle",
  FEATURE_LEARN: "feature_learn",
  GAME_JOURNEY: "game_journey",
  GAME_BADGES: "game_badges",
  CALC_INPUT: "calc_input",
  CALC_RESULT: "calc_result",
  CALC_GENERATIONS: "calc_generations",
  FEEDBACK: "feedback",
  THANKS: "thanks",
};

const FLOW = [
  SCREENS.SPLASH,
  SCREENS.INTRO_1,
  SCREENS.INTRO_2,
  SCREENS.INTRO_3,
  SCREENS.QUIZ_1,
  SCREENS.QUIZ_2,
  SCREENS.QUIZ_3,
  SCREENS.DASHBOARD,
  SCREENS.FEATURE_STACK,
  SCREENS.FEATURE_CIRCLE,
  SCREENS.FEATURE_LEARN,
  SCREENS.GAME_JOURNEY,
  SCREENS.GAME_BADGES,
  SCREENS.CALC_INPUT,
  SCREENS.CALC_RESULT,
  SCREENS.CALC_GENERATIONS,
  SCREENS.FEEDBACK,
  SCREENS.THANKS,
];

// ─── Colour Palette (Orange & Black) ───
const C = {
  bg: "#0A0A0A",
  card: "#141414",
  cardHover: "#1C1C1C",
  accent: "#FF8C00",
  accentDim: "#E07800",
  accentGlow: "rgba(255,140,0,0.15)",
  warm: "#FFB347",
  warmGlow: "rgba(255,179,71,0.12)",
  purple: "#FF6B2B",
  purpleGlow: "rgba(255,107,43,0.12)",
  text: "#F5F0EB",
  textSoft: "#A89E94",
  textMuted: "#6B6360",
  border: "#2A2522",
  danger: "#FF4444",
  dangerGlow: "rgba(255,68,68,0.12)",
  success: "#FF8C00",
};

const fontDisplay = `'Outfit', sans-serif`;
const fontBody = `'DM Sans', sans-serif`;

// ─── Calculator Logic ───
const calcWealth = (monthly, years, rate) => {
  const mr = rate / 100 / 12;
  const months = years * 12;
  if (mr === 0) return monthly * months;
  return monthly * ((Math.pow(1 + mr, months) - 1) / mr);
};

const calcBasicSavings = (monthly, years) => calcWealth(monthly, years, 0.5);

const formatGBP = (v) => {
  if (v >= 1000000) return `£${(v / 1000000).toFixed(1)}m`;
  if (v >= 1000) return `£${Math.round(v / 1000).toLocaleString()}k`;
  return `£${Math.round(v)}`;
};

const formatGBPFull = (v) =>
  new Intl.NumberFormat("en-GB", { style: "currency", currency: "GBP", minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(v);

// Stable phone wrapper - defined OUTSIDE the component so React keeps it mounted
const PhoneShell = ({ containerRef, fadeIn, children }) => (
  <div style={{ width: "100%", height: "100%", background: C.bg, position: "relative", fontFamily: fontBody, color: C.text, overflow: "hidden" }}>
    <div ref={containerRef} style={{ height: "100%", overflowY: "auto", overflowX: "hidden", WebkitOverflowScrolling: "touch" }}>
      <div style={{ opacity: fadeIn ? 1 : 0, transform: fadeIn ? "translateY(0)" : "translateY(12px)", transition: "all 0.28s ease", minHeight: "100%", display: "flex", flexDirection: "column" }}>
        {children}
      </div>
    </div>
  </div>
);

function STAKTPrototype() {
  const [screen, setScreen] = useState(SCREENS.SPLASH);
  const [fadeIn, setFadeIn] = useState(true);
  const [quizAnswers, setQuizAnswers] = useState({});
  const [feedback, setFeedback] = useState({ rating: 0, excites: [], comment: "", email: "" });
  const [submitting, setSubmitting] = useState(false);
  const [calcAge, setCalcAge] = useState(25);
  const [calcMonthly, setCalcMonthly] = useState(100);
  const containerRef = useRef(null);

  useEffect(() => {
    const link = document.createElement("link");
    link.href = "https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap";
    link.rel = "stylesheet";
    document.head.appendChild(link);
  }, []);

  const retireAge = 65;
  const calcYears = retireAge - calcAge;
  const withInvesting = useMemo(() => calcWealth(calcMonthly, calcYears, 7), [calcMonthly, calcYears]);
  const withoutInvesting = useMemo(() => calcBasicSavings(calcMonthly, calcYears), [calcMonthly, calcYears]);
  const totalContributed = calcMonthly * 12 * calcYears;
  const missedGrowth = withInvesting - withoutInvesting;

  const genData = useMemo(() => {
    const g1 = withInvesting;
    const g2Start = g1 * 0.3;
    const g2Own = calcWealth(calcMonthly, 30, 7);
    const g2 = g2Start * Math.pow(1.07, 30) + g2Own;
    const g3Start = g2 * 0.3;
    const g3Own = calcWealth(calcMonthly, 30, 7);
    const g3 = g3Start * Math.pow(1.07, 30) + g3Own;
    return { g1, g2, g3 };
  }, [withInvesting, calcMonthly]);

  const chartData = useMemo(() => {
    const points = [];
    for (let age = calcAge; age <= retireAge; age += 5) {
      const yrs = age - calcAge;
      points.push({ age, invested: calcWealth(calcMonthly, yrs, 7), saved: calcBasicSavings(calcMonthly, yrs) });
    }
    return points;
  }, [calcAge, calcMonthly]);

  const transition = (next) => {
    setFadeIn(false);
    setTimeout(() => {
      setScreen(next);
      setFadeIn(true);
      if (containerRef.current) containerRef.current.scrollTop = 0;
    }, 280);
  };

  const next = () => {
    const i = FLOW.indexOf(screen);
    if (i < FLOW.length - 1) transition(FLOW[i + 1]);
  };

  const saveFeedback = async () => {
    setSubmitting(true);
    try {
      const entry = { quizAnswers, calcAge, calcMonthly, withInvesting, withoutInvesting, feedback, timestamp: new Date().toISOString() };
      feedbackStorage.save(entry);
      // Subscribe to Mailchimp if email provided
      if (feedback.email && feedback.email.includes("@")) {
        subscribeToMailchimp(feedback.email);
      }
    } catch (e) { console.error("Storage error:", e); }
    setSubmitting(false);
    next();
  };

  // ─── Shared Components ───

  const Btn = ({ children, onClick, variant = "primary", disabled = false }) => {
    const base = { width: "100%", padding: "16px 24px", borderRadius: 14, border: "none", fontFamily: fontDisplay, fontWeight: 600, fontSize: 16, cursor: disabled ? "default" : "pointer", transition: "all 0.2s ease", opacity: disabled ? 0.4 : 1 };
    const styles = {
      primary: { ...base, background: C.accent, color: C.bg },
      secondary: { ...base, background: "transparent", color: C.accent, border: `1.5px solid ${C.border}` },
    };
    return <button style={styles[variant]} onClick={disabled ? undefined : onClick}>{children}</button>;
  };

  const Pill = ({ children, active, onClick }) => (
    <button onClick={onClick} style={{ padding: "10px 18px", borderRadius: 100, border: `1.5px solid ${active ? C.accent : C.border}`, background: active ? C.accentGlow : "transparent", color: active ? C.accent : C.textSoft, fontFamily: fontBody, fontWeight: 500, fontSize: 14, cursor: "pointer", transition: "all 0.2s ease" }}>{children}</button>
  );

  const Tag = ({ children, color = C.accent, bg = C.accentGlow }) => (
    <span style={{ display: "inline-block", padding: "4px 12px", borderRadius: 100, background: bg, color, fontSize: 12, fontWeight: 600, fontFamily: fontDisplay, letterSpacing: "0.04em", textTransform: "uppercase" }}>{children}</span>
  );

  const GlowBG = ({ color = C.accent, opacity = 0.08, top = "-20%", left = "50%" }) => (
    <div style={{ position: "absolute", top, left, transform: "translateX(-50%)", width: 400, height: 400, borderRadius: "50%", background: color, opacity, filter: "blur(100px)", pointerEvents: "none" }} />
  );

  // ─── Mini Bar Chart ───
  const MiniChart = ({ data, height = 160 }) => {
    const maxVal = Math.max(...data.map(d => d.invested));
    return (
      <div style={{ display: "flex", alignItems: "flex-end", gap: 4, height, padding: "0 4px" }}>
        {data.map((d, i) => {
          const investedH = maxVal > 0 ? (d.invested / maxVal) * height * 0.88 : 4;
          const savedH = maxVal > 0 ? (d.saved / maxVal) * height * 0.88 : 4;
          return (
            <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
              <div style={{ display: "flex", alignItems: "flex-end", gap: 2, width: "100%" }}>
                <div style={{ flex: 1, height: Math.max(investedH, 4), borderRadius: 4, background: `linear-gradient(180deg, ${C.accent}, ${C.accentDim})`, transition: "height 0.6s ease" }} />
                <div style={{ flex: 1, height: Math.max(savedH, 4), borderRadius: 4, background: C.danger, opacity: 0.45, transition: "height 0.6s ease" }} />
              </div>
              <span style={{ fontSize: 9, color: C.textMuted, fontWeight: 600 }}>{d.age}</span>
            </div>
          );
        })}
      </div>
    );
  };

  // ════════════════════════════════════════
  //  S C R E E N S
  // ════════════════════════════════════════

  // ── SPLASH ──
  if (screen === SCREENS.SPLASH) {
    return (
      <PhoneShell containerRef={containerRef} fadeIn={fadeIn}>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", padding: 32, position: "relative", textAlign: "center" }}>
          <GlowBG />
          <div style={{ width: 80, height: 80, borderRadius: 20, background: `linear-gradient(135deg, ${C.accent}, #FF6B00)`, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 24, boxShadow: `0 8px 32px ${C.accentGlow}` }}>
            <span style={{ fontSize: 36, fontFamily: fontDisplay, fontWeight: 900, color: C.bg }}>S</span>
          </div>
          <h1 style={{ fontFamily: fontDisplay, fontWeight: 800, fontSize: 42, margin: 0, letterSpacing: "-0.03em", lineHeight: 1.1 }}>STAKT</h1>
          <p style={{ color: C.textSoft, fontSize: 15, marginTop: 8, lineHeight: 1.5, maxWidth: 260 }}>Build wealth from as little as £10.<br />No trust fund required.</p>
          <div style={{ marginTop: 48, width: "100%" }}><Btn onClick={next}>See How It Works</Btn></div>
          <p style={{ color: C.textMuted, fontSize: 12, marginTop: 16 }}>Interactive concept preview · 5 min</p>
        </div>
      </PhoneShell>
    );
  }

  // ── INTROS ──
  const introData = {
    [SCREENS.INTRO_1]: { emoji: "🧱", title: "Built for builders", body: "STAKT is for people building wealth from the ground up — no family money, no safety net, just ambition and a plan.", highlight: "73% of young people from lower-income families say they have no idea where to start with money." },
    [SCREENS.INTRO_2]: { emoji: "📊", title: "Stack. Track. Grow.", body: "Set micro-goals. Stack small wins. Watch your money habits compound into something real — starting from as little as £10.", highlight: "Your progress is always visible, always moving forward." },
    [SCREENS.INTRO_3]: { emoji: "🤝", title: "Your crew, your journey", body: "Join circles of people on the same path. Share wins, swap strategies, hold each other accountable. No judgement, just progress.", highlight: "Wealth-building doesn't have to be lonely." },
  };

  if ([SCREENS.INTRO_1, SCREENS.INTRO_2, SCREENS.INTRO_3].includes(screen)) {
    const d = introData[screen];
    const idx = [SCREENS.INTRO_1, SCREENS.INTRO_2, SCREENS.INTRO_3].indexOf(screen);
    return (
      <PhoneShell containerRef={containerRef} fadeIn={fadeIn}>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: 28, position: "relative" }}>
          <GlowBG color={idx === 1 ? C.warm : idx === 2 ? C.purple : C.accent} />
          <div style={{ display: "flex", gap: 6, marginBottom: 48, marginTop: 16 }}>
            {[0, 1, 2].map(i => (<div key={i} style={{ flex: 1, height: 3, borderRadius: 2, background: i <= idx ? C.accent : C.border, transition: "all 0.3s" }} />))}
          </div>
          <div style={{ fontSize: 56, marginBottom: 20 }}>{d.emoji}</div>
          <h2 style={{ fontFamily: fontDisplay, fontWeight: 700, fontSize: 32, margin: 0, lineHeight: 1.15, letterSpacing: "-0.02em" }}>{d.title}</h2>
          <p style={{ color: C.textSoft, fontSize: 16, lineHeight: 1.65, marginTop: 16 }}>{d.body}</p>
          <div style={{ marginTop: 24, padding: 16, borderRadius: 12, background: C.accentGlow, borderLeft: `3px solid ${C.accent}` }}>
            <p style={{ margin: 0, fontSize: 14, color: C.accent, lineHeight: 1.55, fontWeight: 500 }}>{d.highlight}</p>
          </div>
          <div style={{ flex: 1 }} />
          <div style={{ paddingBottom: 20 }}><Btn onClick={next}>Continue</Btn></div>
        </div>
      </PhoneShell>
    );
  }

  // ── QUIZ ──
  const quizData = {
    [SCREENS.QUIZ_1]: { q: "Where are you on your money journey?", key: "stage", options: ["Just getting started", "Got a bit saved", "Building momentum", "Ready to level up"] },
    [SCREENS.QUIZ_2]: { q: "What's your biggest money challenge right now?", key: "challenge", options: ["Not enough to save", "Don't know where to start", "Staying consistent", "Making it grow"] },
    [SCREENS.QUIZ_3]: { q: "What would help you most?", key: "need", options: ["Simple daily habits", "A clear plan", "People doing the same", "Seeing real progress"] },
  };

  if ([SCREENS.QUIZ_1, SCREENS.QUIZ_2, SCREENS.QUIZ_3].includes(screen)) {
    const d = quizData[screen];
    const quizScreens = [SCREENS.QUIZ_1, SCREENS.QUIZ_2, SCREENS.QUIZ_3];
    const idx = quizScreens.indexOf(screen);
    return (
      <PhoneShell containerRef={containerRef} fadeIn={fadeIn}>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: 28, position: "relative" }}>
          <GlowBG color={C.purple} opacity={0.06} />
          <div style={{ marginTop: 16 }}><Tag color={C.purple} bg={C.purpleGlow}>Quick Setup</Tag></div>
          <div style={{ display: "flex", gap: 6, justifyContent: "center", margin: "24px 0 32px" }}>
            {quizScreens.map((_, i) => (<div key={i} style={{ width: i === idx ? 24 : 8, height: 8, borderRadius: 4, background: i <= idx ? C.accent : C.border, transition: "all 0.3s ease" }} />))}
          </div>
          <h2 style={{ fontFamily: fontDisplay, fontWeight: 700, fontSize: 26, margin: 0, lineHeight: 1.2 }}>{d.q}</h2>
          <div style={{ display: "flex", flexDirection: "column", gap: 12, marginTop: 32 }}>
            {d.options.map((opt, i) => (
              <button key={i} onClick={() => setQuizAnswers(prev => ({ ...prev, [d.key]: opt }))} style={{
                padding: "16px 20px", borderRadius: 14, border: `1.5px solid ${quizAnswers[d.key] === opt ? C.accent : C.border}`,
                background: quizAnswers[d.key] === opt ? C.accentGlow : C.card, color: quizAnswers[d.key] === opt ? C.accent : C.text,
                fontFamily: fontBody, fontWeight: 500, fontSize: 15, cursor: "pointer", textAlign: "left", transition: "all 0.2s ease",
                display: "flex", alignItems: "center", gap: 12,
              }}>
                <span style={{ width: 22, height: 22, borderRadius: "50%", border: `2px solid ${quizAnswers[d.key] === opt ? C.accent : C.border}`, background: quizAnswers[d.key] === opt ? C.accent : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all 0.2s" }}>
                  {quizAnswers[d.key] === opt && <span style={{ color: C.bg, fontSize: 12, fontWeight: 700 }}>✓</span>}
                </span>
                {opt}
              </button>
            ))}
          </div>
          <div style={{ flex: 1 }} />
          <div style={{ paddingBottom: 20 }}><Btn onClick={next} disabled={!quizAnswers[d.key]}>Next</Btn></div>
        </div>
      </PhoneShell>
    );
  }

  // ── DASHBOARD ──
  if (screen === SCREENS.DASHBOARD) {
    const stackData = [35, 50, 45, 70, 65, 85, 90];
    const days = ["M", "T", "W", "T", "F", "S", "S"];
    return (
      <PhoneShell containerRef={containerRef} fadeIn={fadeIn}>
        <div style={{ padding: 24, position: "relative" }}>
          <GlowBG color={C.accent} opacity={0.05} top="-30%" />
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 12, marginBottom: 28 }}>
            <div>
              <p style={{ margin: 0, color: C.textMuted, fontSize: 13, fontWeight: 500 }}>Welcome back</p>
              <h2 style={{ fontFamily: fontDisplay, fontWeight: 700, fontSize: 24, margin: 0, marginTop: 2 }}>Your Stack</h2>
            </div>
            <div style={{ width: 40, height: 40, borderRadius: 12, background: `linear-gradient(135deg, ${C.accent}, #FF6B2B)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>👤</div>

                <div style={{ display: "flex", alignItems: "center", gap: 4 }}><div style={{ width: 8, height: 8, borderRadius: 2, background: C.danger, opacity: 0.5 }} /><span style={{ fontSize: 9, color: C.textMuted }}>Savings</span></div>
              </div>
            </div>
            <MiniChart data={chartData} height={130} />
          </div>

          {/* Breakdown */}
          <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8 }}>
            <div style={{ padding: 12, borderRadius: 12, background: C.card, border: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between" }}>
              <span style={{ fontSize: 13, color: C.textSoft }}>You'd put in</span>
              <span style={{ fontSize: 13, fontWeight: 700 }}>{formatGBPFull(totalContributed)}</span>
            </div>
            <div style={{ padding: 12, borderRadius: 12, background: C.card, border: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between" }}>
              <span style={{ fontSize: 13, color: C.textSoft }}>Compound growth adds</span>
              <span style={{ fontSize: 13, fontWeight: 700, color: C.accent }}>{formatGBPFull(Math.max(withInvesting - totalContributed, 0))}</span>
            </div>
            <div style={{ padding: 12, borderRadius: 12, background: C.dangerGlow, border: `1px solid rgba(255,68,68,0.2)`, display: "flex", justifyContent: "space-between" }}>
              <span style={{ fontSize: 13, color: C.danger, fontWeight: 600 }}>Cost of doing nothing</span>
              <span style={{ fontSize: 13, fontWeight: 700, color: C.danger }}>{formatGBPFull(missedGrowth)}</span>
            </div>
          </div>

          <p style={{ marginTop: 16, fontSize: 11, color: C.textMuted, textAlign: "center", lineHeight: 1.5 }}>Based on 7% avg annual return (stocks & shares) vs 0.5% basic savings. Past performance doesn't guarantee future results.</p>

          <div style={{ marginTop: 16, paddingBottom: 20 }}><Btn onClick={next}>See The Generational Impact →</Btn></div>
        </div>
      </PhoneShell>
    );
  }

  // ── CALC GENERATIONS ──
  if (screen === SCREENS.CALC_GENERATIONS) {
    const gens = [
      { label: "You", sub: `Starting at ${calcAge}, £${calcMonthly}/mo`, value: genData.g1, emoji: "👤" },
      { label: "Your Children", sub: "Inherit 30% + invest the same", value: genData.g2, emoji: "👶" },
      { label: "Grandchildren", sub: "The compound effect snowballs", value: genData.g3, emoji: "👶👶" },
    ];
    const maxGen = genData.g3;
    return (
      <PhoneShell containerRef={containerRef} fadeIn={fadeIn}>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: 28, position: "relative" }}>
          <GlowBG color={C.accent} opacity={0.06} />
          <Tag>Generational Wealth</Tag>
          <h2 style={{ fontFamily: fontDisplay, fontWeight: 700, fontSize: 26, margin: "16px 0 0", lineHeight: 1.15 }}>This isn't just<br />about you</h2>
          <p style={{ color: C.textSoft, fontSize: 14, lineHeight: 1.55, marginTop: 8 }}>What you start today creates a legacy. Each generation builds on the last.</p>

          <div style={{ display: "flex", flexDirection: "column", gap: 14, marginTop: 24 }}>
            {gens.map((g, i) => {
              const barW = maxGen > 0 ? Math.max((g.value / maxGen) * 100, 10) : 10;
              return (
                <div key={i} style={{ padding: 16, borderRadius: 16, background: C.card, border: `1px solid ${C.border}` }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                    <span style={{ fontSize: 22 }}>{g.emoji}</span>
                    <div>
                      <p style={{ margin: 0, fontWeight: 600, fontSize: 14 }}>{g.label}</p>
                      <p style={{ margin: 0, fontSize: 11, color: C.textMuted }}>{g.sub}</p>
                    </div>
                  </div>
                  <div style={{ width: "100%", height: 28, borderRadius: 8, background: C.border, position: "relative", overflow: "hidden" }}>
                    <div style={{
                      width: `${barW}%`, height: "100%", borderRadius: 8,
                      background: i === 0 ? C.accent : i === 1 ? C.warm : `linear-gradient(90deg, ${C.accent}, ${C.warm})`,
                      transition: "width 0.8s ease",
                      display: "flex", alignItems: "center", justifyContent: "flex-end", paddingRight: 8,
                    }}>
                      <span style={{ fontSize: 11, fontWeight: 700, color: C.bg, whiteSpace: "nowrap" }}>{formatGBP(g.value)}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* No investment contrast */}
          <div style={{ marginTop: 20, padding: 16, borderRadius: 14, background: C.dangerGlow, border: `1px solid rgba(255,68,68,0.2)` }}>
            <p style={{ margin: 0, fontSize: 13, color: C.danger, fontWeight: 600, marginBottom: 6 }}>Without investing?</p>
            <p style={{ margin: 0, fontSize: 13, color: C.textSoft, lineHeight: 1.55 }}>Every generation starts from zero. No inheritance. No compound effect. The wealth gap stays exactly where it is.</p>
          </div>

          <div style={{ marginTop: 16, padding: 16, borderRadius: 14, background: C.accentGlow, borderLeft: `3px solid ${C.accent}` }}>
            <p style={{ margin: 0, fontSize: 13, color: C.accent, lineHeight: 1.55, fontWeight: 500 }}>
              Your grandchildren could have <strong>{formatGBP(genData.g3)}</strong>. That's the difference STAKT exists to make.
            </p>
          </div>

          <div style={{ flex: 1 }} />
          <div style={{ paddingBottom: 20 }}><Btn onClick={next}>Give Us Your Thoughts</Btn></div>
        </div>
      </PhoneShell>
    );
  }

  // ── FEEDBACK ──
  if (screen === SCREENS.FEEDBACK) {
    const exciteOptions = ["Micro-Stacking", "Stack Circles", "Daily Lessons", "XP & Levelling System", "Achievement Badges", "Reality Check Calculator", "Generational Wealth View"];
    return (
      <PhoneShell containerRef={containerRef} fadeIn={fadeIn}>
        <div style={{ padding: 28, position: "relative" }}>
          <GlowBG color={C.warm} opacity={0.06} />
          <Tag color={C.warm} bg={C.warmGlow}>Your Opinion Matters</Tag>
          <h2 style={{ fontFamily: fontDisplay, fontWeight: 700, fontSize: 28, margin: "16px 0 0", lineHeight: 1.15 }}>What do you think?</h2>
          <p style={{ color: C.textSoft, fontSize: 14, lineHeight: 1.55 }}>Help shape STAKT — your honest feedback builds a better product.</p>

          <div style={{ marginTop: 24 }}>
            <p style={{ margin: "0 0 12px", fontWeight: 600, fontSize: 14 }}>How likely would you use STAKT?</p>
            <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
              {[1, 2, 3, 4, 5].map(n => (
                <button key={n} onClick={() => setFeedback(f => ({ ...f, rating: n }))} style={{
                  width: 52, height: 52, borderRadius: 14, border: `2px solid ${feedback.rating >= n ? C.accent : C.border}`,
                  background: feedback.rating >= n ? C.accentGlow : C.card, color: feedback.rating >= n ? C.accent : C.textMuted,
                  fontSize: 18, fontWeight: 700, cursor: "pointer", fontFamily: fontDisplay, transition: "all 0.2s",
                }}>{n}</button>
              ))}
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
              <span style={{ fontSize: 11, color: C.textMuted }}>Not likely</span>
              <span style={{ fontSize: 11, color: C.textMuted }}>Definitely</span>
            </div>
          </div>

          <div style={{ marginTop: 28 }}>
            <p style={{ margin: "0 0 12px", fontWeight: 600, fontSize: 14 }}>What excites you most? <span style={{ fontWeight: 400, color: C.textMuted }}>(pick any)</span></p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {exciteOptions.map(opt => (
                <Pill key={opt} active={feedback.excites.includes(opt)} onClick={() => {
                  setFeedback(f => ({ ...f, excites: f.excites.includes(opt) ? f.excites.filter(e => e !== opt) : [...f.excites, opt] }));
                }}>{opt}</Pill>
              ))}
            </div>
          </div>

          <div style={{ marginTop: 28 }}>
            <p style={{ margin: "0 0 12px", fontWeight: 600, fontSize: 14 }}>Anything else on your mind?</p>
            <textarea value={feedback.comment} onChange={e => setFeedback(f => ({ ...f, comment: e.target.value }))} placeholder="What would make STAKT a must-have for you?" style={{
              width: "100%", minHeight: 80, padding: 14, borderRadius: 14, border: `1.5px solid ${C.border}`,
              background: C.card, color: C.text, fontFamily: fontBody, fontSize: 14, resize: "vertical", boxSizing: "border-box", outline: "none",
            }} />
          </div>

          <div style={{ marginTop: 24 }}>
            <p style={{ margin: "0 0 12px", fontWeight: 600, fontSize: 14 }}>Want early access? <span style={{ fontWeight: 400, color: C.textMuted }}>(optional)</span></p>
            <input type="email" value={feedback.email} onChange={e => setFeedback(f => ({ ...f, email: e.target.value }))} placeholder="your@email.com" style={{
              width: "100%", padding: 14, borderRadius: 14, border: `1.5px solid ${C.border}`,
              background: C.card, color: C.text, fontFamily: fontBody, fontSize: 14, boxSizing: "border-box", outline: "none",
            }} />
          </div>

          <div style={{ marginTop: 32, paddingBottom: 20 }}>
            <Btn onClick={saveFeedback} disabled={feedback.rating === 0 || submitting}>
              {submitting ? "Sending..." : "Submit Feedback"}
            </Btn>
          </div>
        </div>
      </PhoneShell>
    );
  }

  // ── THANKS ──
  if (screen === SCREENS.THANKS) {
    return (
      <PhoneShell containerRef={containerRef} fadeIn={fadeIn}>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", padding: 32, textAlign: "center", position: "relative" }}>
          <GlowBG />
          <div style={{ width: 80, height: 80, borderRadius: "50%", background: C.accentGlow, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 24, border: `2px solid ${C.accent}` }}>
            <span style={{ fontSize: 36 }}>🙏</span>
          </div>
          <h2 style={{ fontFamily: fontDisplay, fontWeight: 700, fontSize: 30, margin: 0 }}>Thank you!</h2>
          <p style={{ color: C.textSoft, fontSize: 15, lineHeight: 1.6, marginTop: 12, maxWidth: 280 }}>Your feedback is shaping something real. If you left your email, we'll be in touch when STAKT is ready.</p>
          <div style={{ marginTop: 32, padding: 16, borderRadius: 14, background: C.card, border: `1px solid ${C.border}`, width: "100%" }}>
            <p style={{ margin: 0, fontSize: 14, color: C.textSoft }}>Know someone who'd want this?</p>
            <p style={{ margin: "8px 0 0", fontSize: 14, fontWeight: 600, color: C.accent }}>Share this link with them ↗</p>
          </div>
          <div style={{ marginTop: 40, width: "100%" }}>
            <Btn variant="secondary" onClick={() => transition(SCREENS.SPLASH)}>Start Over</Btn>
          </div>
        </div>
      </PhoneShell>
    );
  }

  return null;
}

  return (
    <>
      {/* Desktop layout */}
      <div className="desktop-shell">
        <div className="desktop-brand">
          <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:24}}>
            <div style={{width:56,height:56,borderRadius:14,background:"linear-gradient(135deg,#FF8C00,#FF6B00)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 8px 32px rgba(255,140,0,0.2)"}}>
              <span style={{fontSize:28,fontFamily:"'Outfit',sans-serif",fontWeight:900,color:"#0A0A0A"}}>S</span>
            </div>
            <span style={{fontFamily:"'Outfit',sans-serif",fontWeight:800,fontSize:28,color:"#F5F0EB",letterSpacing:"-0.03em"}}>STAKT</span>
          </div>
          <h1>Build wealth from<br/>as little as £10.</h1>
          <p className="tagline">The financial platform for first-generation wealth builders. Try the interactive prototype — swipe through features, run the numbers, and tell us what you think.</p>
          <div className="stat-row">
            <div className="stat"><div className="stat-num">73%</div><div className="stat-label">of young people don't<br/>know where to start</div></div>
            <div className="stat"><div className="stat-num">9x</div><div className="stat-label">wealth gap between<br/>inherited vs self-built</div></div>
            <div className="stat"><div className="stat-num">£10</div><div className="stat-label">is all you need<br/>to get started</div></div>
          </div>
          <p className="cta-note"><span>&#8592; Try the prototype</span> — it takes about 5 minutes. Your feedback directly shapes what we build. Share the link with anyone who should see this.</p>
        </div>
        <div className="phone-frame">
          <div className="phone-frame-inner">
            <STAKTPrototype />
          </div>
        </div>
      </div>
      {/* Mobile layout */}
      <div className="mobile-fullscreen" style={{height:"100dvh"}}>

    </>
  );
}

</script>
